<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나뭇잎 하나 — 2026. 3. 24</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #F5F1EB;
            overflow: hidden;
            height: 100vh;
            cursor: none;
        }
        canvas { display: block; }
        .date {
            position: fixed; top: 28px; left: 32px;
            font-family: Georgia, serif; font-size: 13px;
            color: #C0B8AC; pointer-events: none;
        }
        .hint {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            font-family: Georgia, serif; font-size: 11px;
            color: #C8C0B4; pointer-events: none;
            opacity: 1; transition: opacity 3s;
        }
        .dot {
            position: fixed; width: 5px; height: 5px;
            background: rgba(60,50,40,0.3); border-radius: 50%;
            pointer-events: none; z-index: 99;
            transform: translate(-50%,-50%);
        }
    </style>
</head>
<body>
    <div class="date">2026. 3. 24</div>
    <div class="hint" id="hint">빛을 움직여보세요</div>
    <div class="dot" id="dot"></div>
    <canvas id="c"></canvas>
<script>
{
    const C = document.getElementById('c');
    const X = C.getContext('2d');
    const dot = document.getElementById('dot');
    const hint = document.getElementById('hint');

    let W, H;
    function resize() { W = C.width = innerWidth; H = C.height = innerHeight; }
    resize();
    addEventListener('resize', resize);

    let mx = W * 0.65, my = H * 0.3;
    let lx = 0.5, ly = -0.3, tlx = 0.5, tly = -0.3;
    let hinted = false;

    addEventListener('mousemove', e => {
        mx = e.clientX; my = e.clientY;
        dot.style.left = mx + 'px'; dot.style.top = my + 'px';
        tlx = (mx - W/2) / (W/2);
        tly = (my - H/2) / (H/2);
        if (!hinted) { hinted = true; hint.style.opacity = '0'; }
    });
    addEventListener('touchmove', e => {
        mx = e.touches[0].clientX; my = e.touches[0].clientY;
        tlx = (mx - W/2) / (W/2);
        tly = (my - H/2) / (H/2);
        if (!hinted) { hinted = true; hint.style.opacity = '0'; }
    }, { passive: true });

    // ─── 종이 텍스처 ───
    const paper = document.createElement('canvas');
    paper.width = paper.height = 512;
    {
        const c = paper.getContext('2d');
        c.fillStyle = '#F5F1EB';
        c.fillRect(0, 0, 512, 512);
        const d = c.getImageData(0, 0, 512, 512);
        for (let i = 0; i < d.data.length; i += 4) {
            const n = (Math.random() - 0.5) * 10;
            d.data[i] += n; d.data[i+1] += n; d.data[i+2] += n - 2;
        }
        c.putImageData(d, 0, 0);
    }

    // ─── 잎 형태 ───
    // 원본: 넓은 하트형, 줄기가 오른쪽 위, 끝이 아래로 뾰족
    // 약간 왼쪽으로 기울어진 비대칭
    function leafShape(s) {
        X.beginPath();
        // 줄기 접합점 (상단 중앙 약간 오른쪽)
        X.moveTo(s * 8, -s * 115);

        // 오른쪽 상단 로브 (넓고 둥글게)
        X.bezierCurveTo(
            s * 65,  -s * 132,
            s * 125, -s * 80,
            s * 118, -s * 10
        );
        // 오른쪽 중단 → 하단
        X.bezierCurveTo(
            s * 112, s * 50,
            s * 68,  s * 105,
            s * 15,  s * 138
        );
        // 끝점 (뾰족하게)
        X.bezierCurveTo(
            s * 2, s * 148,
            -s * 8, s * 148,
            -s * 15, s * 140
        );
        // 왼쪽 하단 → 중단
        X.bezierCurveTo(
            -s * 62, s * 108,
            -s * 118, s * 50,
            -s * 125, -s * 5
        );
        // 왼쪽 상단 로브
        X.bezierCurveTo(
            -s * 130, -s * 75,
            -s * 78,  -s * 132,
            -s * 12,  -s * 117
        );
        // 줄기로 복귀
        X.bezierCurveTo(
            -s * 2, -s * 116,
            s * 3,  -s * 116,
            s * 8,  -s * 115
        );
        X.closePath();
    }

    // ─── 연필 스트로크 레이어 생성 (오프스크린) ───
    // 실제 연필처럼 사선 방향 스트로크를 수천 개 깔아서 톤을 만듦
    function buildPencilLayer(w, h, density, angle, minA, maxA, minW, maxW) {
        const off = document.createElement('canvas');
        off.width = w; off.height = h;
        const c = off.getContext('2d');
        c.lineCap = 'round';
        const cos = Math.cos(angle), sin = Math.sin(angle);
        for (let i = 0; i < density; i++) {
            const sx = Math.random() * w;
            const sy = Math.random() * h;
            const len = 4 + Math.random() * 18;
            c.beginPath();
            c.moveTo(sx, sy);
            // 약간의 떨림
            const wobble = (Math.random() - 0.5) * 0.15;
            c.lineTo(
                sx + (cos + wobble) * len,
                sy + (sin + wobble) * len
            );
            c.strokeStyle = `rgba(25,20,15,${minA + Math.random() * (maxA - minA)})`;
            c.lineWidth = minW + Math.random() * (maxW - minW);
            c.stroke();
        }
        return off;
    }

    // 여러 각도의 해칭 레이어
    const hatch1 = buildPencilLayer(500, 500, 4000, -0.6,  0.02, 0.07, 0.3, 1.0);
    const hatch2 = buildPencilLayer(500, 500, 2500, -0.6 + Math.PI/3, 0.015, 0.05, 0.2, 0.7);
    const hatch3 = buildPencilLayer(500, 500, 1500, -0.6 + Math.PI/2, 0.01, 0.04, 0.2, 0.5);

    // ─── 잎맥 그리기 ───
    function drawVeins(s, lightDir) {
        // 중심맥 — 줄기에서 끝까지 약간 곡선으로
        // 어두운 홈
        X.beginPath();
        X.moveTo(s * 5, -s * 112);
        X.bezierCurveTo(s * 4, -s * 40, -s * 1, s * 50, -s * 4, s * 143);
        X.strokeStyle = `rgba(35,30,22,${0.3 + Math.abs(lightDir) * 0.1})`;
        X.lineWidth = s * 3.5;
        X.lineCap = 'round';
        X.stroke();

        // 중심맥 밝은 능선 (빛 방향쪽)
        X.beginPath();
        X.moveTo(s * 6 + lightDir * s * 1.5, -s * 111);
        X.bezierCurveTo(
            s * 5 + lightDir * s * 1.5, -s * 38,
            lightDir * s * 1.5, s * 52,
            -s * 3 + lightDir * s * 1, s * 141
        );
        X.strokeStyle = `rgba(215,205,190,${0.5 + Math.abs(lightDir) * 0.25})`;
        X.lineWidth = s * 1.8;
        X.stroke();

        // 측맥
        const veins = [
            { t: 0.1,  rAng: 0.42,  lAng: -0.48, rLen: 0.45, lLen: 0.5  },
            { t: 0.22, rAng: 0.48,  lAng: -0.52, rLen: 0.65, lLen: 0.7  },
            { t: 0.36, rAng: 0.52,  lAng: -0.50, rLen: 0.82, lLen: 0.85 },
            { t: 0.48, rAng: 0.55,  lAng: -0.48, rLen: 0.88, lLen: 0.9  },
            { t: 0.58, rAng: 0.50,  lAng: -0.45, rLen: 0.78, lLen: 0.82 },
            { t: 0.68, rAng: 0.48,  lAng: -0.42, rLen: 0.62, lLen: 0.65 },
            { t: 0.78, rAng: 0.45,  lAng: -0.40, rLen: 0.45, lLen: 0.48 },
            { t: 0.87, rAng: 0.40,  lAng: -0.38, rLen: 0.28, lLen: 0.30 },
        ];

        for (const v of veins) {
            // 중심맥 위의 시작점
            const sy = -s * 112 + v.t * s * 255;
            const sx = s * 5 - v.t * s * 9;
            const baseLen = s * 110;

            // ── 오른쪽 맥 ──
            const rL = baseLen * v.rLen;
            const rEx = sx + Math.cos(v.rAng) * rL;
            const rEy = sy + Math.sin(v.rAng) * rL;
            // 곡선의 컨트롤 포인트 (약간 위로 볼록하게)
            const rCx = sx + Math.cos(v.rAng) * rL * 0.55 + s * 5;
            const rCy = sy + Math.sin(v.rAng) * rL * 0.4;

            // 어두운 홈
            X.beginPath();
            X.moveTo(sx + s * 1, sy);
            X.quadraticCurveTo(rCx, rCy, rEx, rEy);
            X.strokeStyle = `rgba(40,35,25,${0.15 + v.rLen * 0.12})`;
            X.lineWidth = s * 2.2 * v.rLen;
            X.stroke();
            // 밝은 능선
            X.beginPath();
            X.moveTo(sx + s * 1.5, sy - s * 0.8);
            X.quadraticCurveTo(rCx + s * 0.5, rCy - s * 1, rEx, rEy - s * 0.5);
            X.strokeStyle = `rgba(210,200,185,${(0.2 + Math.max(0, lightDir) * 0.35) * v.rLen})`;
            X.lineWidth = s * 1.0 * v.rLen;
            X.stroke();

            // 세맥 (잔가지)
            if (v.rLen > 0.4) {
                for (let k = 0.3; k < 0.85; k += 0.18 + Math.random() * 0.1) {
                    const bx = (1-k)*(1-k)*sx + 2*(1-k)*k*rCx + k*k*rEx;
                    const by = (1-k)*(1-k)*sy + 2*(1-k)*k*rCy + k*k*rEy;
                    const sLen = s * 15 * v.rLen * (1 - k * 0.5);
                    const sAng = v.rAng + 0.4 + Math.random() * 0.3;
                    X.beginPath();
                    X.moveTo(bx, by);
                    X.quadraticCurveTo(
                        bx + Math.cos(sAng) * sLen * 0.6,
                        by + Math.sin(sAng) * sLen * 0.6,
                        bx + Math.cos(sAng) * sLen,
                        by + Math.sin(sAng) * sLen
                    );
                    X.strokeStyle = `rgba(180,170,155,${0.12 + Math.max(0, lightDir) * 0.12})`;
                    X.lineWidth = s * 0.5;
                    X.stroke();
                }
            }

            // ── 왼쪽 맥 ──
            const lL = baseLen * v.lLen;
            const lEx = sx + Math.cos(Math.PI + v.lAng) * lL;
            const lEy = sy + Math.sin(Math.PI + v.lAng) * lL;
            const lCx = sx + Math.cos(Math.PI + v.lAng) * lL * 0.55 - s * 5;
            const lCy = sy + Math.sin(Math.PI + v.lAng) * lL * 0.4;

            X.beginPath();
            X.moveTo(sx - s * 1, sy);
            X.quadraticCurveTo(lCx, lCy, lEx, lEy);
            X.strokeStyle = `rgba(40,35,25,${0.15 + v.lLen * 0.12})`;
            X.lineWidth = s * 2.2 * v.lLen;
            X.stroke();
            X.beginPath();
            X.moveTo(sx - s * 1.5, sy - s * 0.8);
            X.quadraticCurveTo(lCx - s * 0.5, lCy - s * 1, lEx, lEy - s * 0.5);
            X.strokeStyle = `rgba(210,200,185,${(0.2 + Math.max(0, -lightDir) * 0.35) * v.lLen})`;
            X.lineWidth = s * 1.0 * v.lLen;
            X.stroke();

            if (v.lLen > 0.4) {
                for (let k = 0.3; k < 0.85; k += 0.18 + Math.random() * 0.1) {
                    const bx = (1-k)*(1-k)*sx + 2*(1-k)*k*lCx + k*k*lEx;
                    const by = (1-k)*(1-k)*sy + 2*(1-k)*k*lCy + k*k*lEy;
                    const sLen = s * 15 * v.lLen * (1 - k * 0.5);
                    const sAng = Math.PI + v.lAng - 0.4 - Math.random() * 0.3;
                    X.beginPath();
                    X.moveTo(bx, by);
                    X.quadraticCurveTo(
                        bx + Math.cos(sAng) * sLen * 0.6,
                        by + Math.sin(sAng) * sLen * 0.6,
                        bx + Math.cos(sAng) * sLen,
                        by + Math.sin(sAng) * sLen
                    );
                    X.strokeStyle = `rgba(180,170,155,${0.12 + Math.max(0, -lightDir) * 0.12})`;
                    X.lineWidth = s * 0.5;
                    X.stroke();
                }
            }
        }
    }

    // ─── 메인 렌더 ───
    function render() {
        const s = Math.min(W, H) * 0.0022;

        // 종이 배경
        X.fillStyle = '#F5F1EB';
        X.fillRect(0, 0, W, H);
        for (let x = 0; x < W; x += 512)
            for (let y = 0; y < H; y += 512)
                X.drawImage(paper, x, y);

        X.save();
        X.translate(W/2, H/2);
        X.rotate(lx * 0.025 + Math.sin(Date.now() * 0.0006) * 0.008);

        // ── 그림자 ──
        X.save();
        X.translate(-lx * s * 22 + s * 3, s * 18 - ly * s * 12);
        X.scale(1, 0.22);
        const shG = X.createRadialGradient(0, s * 135, 0, 0, s * 135, s * 110);
        shG.addColorStop(0, 'rgba(60,50,40,0.10)');
        shG.addColorStop(0.5, 'rgba(60,50,40,0.04)');
        shG.addColorStop(1, 'rgba(60,50,40,0)');
        X.fillStyle = shG;
        X.beginPath();
        X.ellipse(0, s * 135, s * 110, s * 55, 0, 0, Math.PI * 2);
        X.fill();
        X.restore();

        // ── 1. 기본 톤 (밝은 회색 ~ 어두운 회색 그라데이션) ──
        leafShape(s);
        // 빛 방향에 따라 그라데이션 축 회전
        const gAngle = Math.atan2(ly, lx);
        const gDist = s * 150;
        const baseG = X.createLinearGradient(
            Math.cos(gAngle + Math.PI) * gDist,
            Math.sin(gAngle + Math.PI) * gDist,
            Math.cos(gAngle) * gDist,
            Math.sin(gAngle) * gDist
        );
        // 빛 반대쪽: 매우 어둡게 / 빛쪽: 밝게
        baseG.addColorStop(0, '#1E1A16');
        baseG.addColorStop(0.15, '#2A2622');
        baseG.addColorStop(0.3, '#3E3A35');
        baseG.addColorStop(0.5, '#5A5550');
        baseG.addColorStop(0.7, '#787270');
        baseG.addColorStop(0.85, '#908A85');
        baseG.addColorStop(1, '#A8A298');
        X.fillStyle = baseG;
        X.fill();

        // ── 2. 볼록 하이라이트 (빛이 닿는 부분) ──
        leafShape(s);
        X.save(); X.clip();
        const hlX = lx * s * 55, hlY = ly * s * 45 - s * 15;
        const hlG = X.createRadialGradient(hlX, hlY, 0, hlX, hlY, s * 110);
        hlG.addColorStop(0, 'rgba(250,245,235,0.25)');
        hlG.addColorStop(0.3, 'rgba(230,225,215,0.1)');
        hlG.addColorStop(0.6, 'rgba(0,0,0,0)');
        hlG.addColorStop(1, 'rgba(15,12,8,0.08)');
        X.fillStyle = hlG;
        X.fillRect(-s * 160, -s * 160, s * 320, s * 340);

        // 둘째 하이라이트 (상단 볼록)
        const h2X = lx * s * 30, h2Y = -s * 50 + ly * s * 25;
        const h2G = X.createRadialGradient(h2X, h2Y, 0, h2X, h2Y, s * 80);
        h2G.addColorStop(0, 'rgba(255,250,240,0.18)');
        h2G.addColorStop(0.5, 'rgba(0,0,0,0)');
        h2G.addColorStop(1, 'rgba(0,0,0,0)');
        X.fillStyle = h2G;
        X.fillRect(-s * 160, -s * 160, s * 320, s * 340);
        X.restore();

        // ── 3. 해칭 레이어 (연필 결) ──
        // 빛 방향에 따라 어두운 쪽에 더 많이 깔림
        leafShape(s);
        X.save(); X.clip();

        // 메인 해칭 — 어두운 쪽에 진하게
        X.globalAlpha = 0.45 + (1 - Math.max(lx, -lx)) * 0.1;
        X.globalCompositeOperation = 'multiply';
        for (let tx = -s * 140; tx < s * 140; tx += hatch1.width)
            for (let ty = -s * 150; ty < s * 160; ty += hatch1.height)
                X.drawImage(hatch1, tx, ty);

        // 크로스해칭 — 어두운 영역에만
        X.globalAlpha = 0.3;
        for (let tx = -s * 140; tx < s * 140; tx += hatch2.width)
            for (let ty = -s * 150; ty < s * 160; ty += hatch2.height)
                X.drawImage(hatch2, tx, ty);

        // 세번째 해칭 — 가장 어두운 부분
        X.globalAlpha = 0.15;
        for (let tx = -s * 140; tx < s * 140; tx += hatch3.width)
            for (let ty = -s * 150; ty < s * 160; ty += hatch3.height)
                X.drawImage(hatch3, tx, ty);

        X.globalCompositeOperation = 'source-over';
        X.globalAlpha = 1;

        // 빛이 닿는 쪽은 해칭을 지워서 밝게 (종이색 복원)
        const eraseG = X.createRadialGradient(hlX, hlY, 0, hlX, hlY, s * 90);
        eraseG.addColorStop(0, 'rgba(245,241,235,0.35)');
        eraseG.addColorStop(0.4, 'rgba(245,241,235,0.15)');
        eraseG.addColorStop(1, 'rgba(245,241,235,0)');
        X.fillStyle = eraseG;
        X.fillRect(-s * 160, -s * 160, s * 320, s * 340);

        X.restore();

        // ── 4. 잎맥 ──
        leafShape(s);
        X.save(); X.clip();
        drawVeins(s, lx);
        X.restore();

        // ── 5. 가장자리 ──
        leafShape(s);
        X.strokeStyle = `rgba(40,35,28,${0.5 + Math.abs(lx) * 0.15})`;
        X.lineWidth = s * 1.6;
        X.lineJoin = 'round';
        X.stroke();

        // 가장자리 안쪽 밝은 선 (빛이 가장자리를 스치는 느낌)
        leafShape(s);
        X.save(); X.clip();
        leafShape(s);
        X.strokeStyle = `rgba(200,195,185,${0.06 + Math.max(0, lx) * 0.06})`;
        X.lineWidth = s * 4;
        X.stroke();
        X.restore();

        // ── 6. 줄기 ──
        // 줄기: 짧고, 약간 오른쪽 위로 살짝 곡선
        X.beginPath();
        X.moveTo(s * 5, -s * 114);
        X.bezierCurveTo(s * 12, -s * 128, s * 16, -s * 140, s * 20, -s * 155);
        X.strokeStyle = `rgba(65,55,42,${0.6 + Math.abs(lx) * 0.2})`;
        X.lineWidth = s * 3;
        X.lineCap = 'round';
        X.stroke();

        // 줄기 밝은 면
        X.beginPath();
        X.moveTo(s * 6.5, -s * 115);
        X.bezierCurveTo(s * 13, -s * 129, s * 17, -s * 141, s * 21, -s * 154);
        X.strokeStyle = `rgba(190,180,165,${0.18 + Math.max(0, lx) * 0.2})`;
        X.lineWidth = s * 1;
        X.stroke();

        // 줄기 끝 꼭지 (작은 원형 돌기)
        X.beginPath();
        X.arc(s * 20.5, -s * 156, s * 2.2, 0, Math.PI * 2);
        X.fillStyle = `rgba(75,65,50,${0.5 + Math.abs(lx) * 0.15})`;
        X.fill();
        // 꼭지 하이라이트
        X.beginPath();
        X.arc(s * 20 + lx * s * 0.8, -s * 157, s * 0.8, 0, Math.PI * 2);
        X.fillStyle = `rgba(200,190,175,${0.25 + Math.max(0, lx) * 0.2})`;
        X.fill();

        X.restore();
    }

    // ─── 파티클 (연필 가루) ───
    const parts = [];
    class P {
        constructor() {
            const s = Math.min(W, H) * 0.0022;
            this.x = W/2 + (Math.random() - 0.5) * s * 180;
            this.y = H/2 + (Math.random() - 0.6) * s * 180;
            this.vx = (Math.random() - 0.5) * 0.3;
            this.vy = 0.2 + Math.random() * 0.5;
            this.sz = 0.3 + Math.random() * 1;
            this.a = 0.08 + Math.random() * 0.12;
            this.life = 1;
            this.dec = 0.003 + Math.random() * 0.005;
            this.r = Math.random() * Math.PI;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            this.r += 0.01; this.life -= this.dec;
            return this.life > 0;
        }
        draw() {
            X.save();
            X.translate(this.x, this.y);
            X.rotate(this.r);
            X.globalAlpha = this.a * this.life;
            X.fillStyle = '#6A6258';
            X.fillRect(0, 0, this.sz, this.sz * 2.5);
            X.restore();
        }
    }

    // ─── 루프 ───
    let frame = 0;
    function loop() {
        requestAnimationFrame(loop);
        frame++;
        lx += (tlx - lx) * 0.04;
        ly += (tly - ly) * 0.04;

        render();

        if (frame % 10 === 0 && parts.length < 35) parts.push(new P());
        for (let i = parts.length - 1; i >= 0; i--) {
            if (!parts[i].update()) parts.splice(i, 1);
            else parts[i].draw();
        }
    }
    loop();
}
</script>
