<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나란히, 느티나무 — DESIGN</title>
    <meta name="theme-color" content="#E84B8A">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Space+Mono:wght@700&family=Dancing+Script:wght@700&family=Bebas+Neue&family=Poppins:wght@700&family=Abril+Fatface&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23E84B8A'/><stop offset='1' stop-color='%23F06040'/></linearGradient></defs><circle cx='16' cy='16' r='15' fill='url(%23g)'/></svg>" type="image/svg+xml">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; cursor: none; }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
{
    const canvas = document.getElementById('c');
    let ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        circle.x = canvas.width / 2;
        circle.y = canvas.height / 2;
    }

    const circle = { x: 0, y: 0, radius: 6 };
    resize();
    window.addEventListener('resize', resize);

    /* ─── DESIGN 글리프 설정 ─── */
    const GLYPHS = [
        { char: 'D', fontFamily: 'Playfair Display', weight: '900', baseSize: 11 },
        { char: 'E', fontFamily: 'Space Mono',       weight: '700', baseSize: 10 },
        { char: 'S', fontFamily: 'Dancing Script',    weight: '700', baseSize: 12 },
        { char: 'I', fontFamily: 'Bebas Neue',        weight: '400', baseSize: 12 },
        { char: 'G', fontFamily: 'Poppins',           weight: '700', baseSize: 10 },
        { char: 'N', fontFamily: 'Abril Fatface',     weight: '400', baseSize: 11 },
    ];

    const BLOCK_COLORS = [
        '#4CAF50', '#7E57C2', '#333333', '#FFC107',
        '#E91E63', '#43A047', '#AB47BC', '#FF5722',
    ];

    const SHAPES = ['circle', 'triangle', 'square'];

    function isLightColor(hex) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return (r * 0.299 + g * 0.587 + b * 0.114) > 150;
    }

    /* ─── 오프스크린 캐시 ─── */
    const CACHE_SIZES = [6, 7, 8, 9, 10, 11, 12, 13];
    const cache = {};
    let cacheReady = false;

    function buildCache() {
        GLYPHS.forEach((glyph, gi) => {
            BLOCK_COLORS.forEach((color, ci) => {
                CACHE_SIZES.forEach(size => {
                    const key = `g_${gi}_${ci}_${size}`;
                    const px = size * 2;
                    const off = document.createElement('canvas');
                    off.width = px; off.height = px;
                    const c = off.getContext('2d');
                    c.scale(2, 2);
                    c.fillStyle = color;
                    c.fillRect(0, 0, size, size);
                    const fontSize = glyph.baseSize * (size / 14);
                    c.font = `${glyph.weight} ${fontSize}px "${glyph.fontFamily}"`;
                    c.textAlign = 'center'; c.textBaseline = 'middle';
                    c.fillStyle = isLightColor(color) ? '#000' : '#fff';
                    c.fillText(glyph.char, size / 2, size / 2 + 1);
                    cache[key] = off;
                });
            });
        });
        SHAPES.forEach((shape, si) => {
            BLOCK_COLORS.forEach((color, ci) => {
                CACHE_SIZES.forEach(size => {
                    const key = `s_${si}_${ci}_${size}`;
                    const px = size * 2;
                    const off = document.createElement('canvas');
                    off.width = px; off.height = px;
                    const c = off.getContext('2d');
                    c.scale(2, 2);
                    c.fillStyle = '#ffffff';
                    const half = size / 2;
                    if (shape === 'circle') {
                        c.beginPath(); c.arc(half, half, half * 0.85, 0, Math.PI * 2); c.fill();
                    } else if (shape === 'triangle') {
                        c.beginPath(); c.moveTo(half, half * 0.2); c.lineTo(size * 0.9, size * 0.85); c.lineTo(size * 0.1, size * 0.85); c.closePath(); c.fill();
                    } else {
                        c.fillRect(size * 0.1, size * 0.1, size * 0.8, size * 0.8);
                    }
                    cache[key] = off;
                });
            });
        });
        cacheReady = true;
    }
    document.fonts.ready.then(buildCache);

    function drawCached(x, y, prefix, typeIdx, colorIdx, blockSize, rotation, opacity) {
        if (!cacheReady) return;
        const key = `${prefix}_${typeIdx}_${colorIdx}_${blockSize}`;
        const cached = cache[key];
        if (!cached) return;
        ctx.save();
        ctx.globalAlpha = opacity;
        ctx.translate(x, y);
        ctx.rotate(rotation);
        ctx.drawImage(cached, -blockSize / 2, -blockSize / 2, blockSize, blockSize);
        ctx.restore();
    }

    /* ─── 커서 트레일 ─── */
    let mouseX = canvas.width / 2, mouseY = canvas.height / 2;
    let isMouseActive = false, isMouseVisible = false;
    const cursorTrail = [];
    const MAX_TRAIL = 12;
    const TRAIL_SPAWN_DIST = 40;
    let lastTrailX = 0, lastTrailY = 0;

    class TrailBlock {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.typeIdx = Math.floor(Math.random() * GLYPHS.length);
            this.colorIdx = Math.floor(Math.random() * BLOCK_COLORS.length);
            this.rotation = (Math.random() - 0.5) * 0.6;
            this.size = 12;
            this.drawScale = 1.2 + Math.random() * 0.8;
            this.scale = 0; this.targetScale = 1;
            this.alpha = 1; this.targetAlpha = 1;
            this.fading = false; this.flashAlpha = 1.0;
        }
        update(tx, ty, i) {
            const ease = 0.16 - i * 0.01;
            this.x += (tx - this.x) * Math.max(0.03, ease);
            this.y += (ty - this.y) * Math.max(0.03, ease);
            this.scale += (this.targetScale - this.scale) * 0.25;
            this.alpha += (this.targetAlpha - this.alpha) * 0.2;
            this.rotation += Math.sin(Date.now() * 0.003 + i) * 0.002;
            this.flashAlpha *= 0.88;
        }
        fadeOut() { this.fading = true; this.targetAlpha = 0; this.targetScale = 0.3; }
        draw() {
            if (this.alpha < 0.01) return;
            const key = `g_${this.typeIdx}_${this.colorIdx}_${this.size}`;
            const cached = cache[key];
            if (!cached) return;
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.translate(this.x, this.y);
            ctx.rotate(this.rotation);
            ctx.scale(this.scale * 1.12 * this.drawScale, this.scale * 1.12 * this.drawScale);
            ctx.drawImage(cached, -this.size / 2, -this.size / 2, this.size, this.size);
            if (this.flashAlpha > 0.01) {
                ctx.globalAlpha = this.alpha * this.flashAlpha;
                ctx.fillStyle = '#fff';
                ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
            }
            ctx.restore();
        }
    }

    canvas.addEventListener('mousemove', (e) => {
        mouseX = e.clientX; mouseY = e.clientY;
        isMouseActive = true; isMouseVisible = true;
    });
    canvas.addEventListener('mouseleave', () => { isMouseActive = false; isMouseVisible = false; });
    canvas.addEventListener('touchstart', () => { isMouseActive = false; }, { passive: true });

    /* ─── 나무 성장 시스템 ─── */
    const initialAngle = Math.random() * Math.PI * 2;
    let pathAngle = initialAngle;
    let targetPathAngle = initialAngle;
    const pathSpeed = 1.673;

    let zoom = 2, targetZoom = 2, zoomFrom = 2, zoomProgress = 1;
    const zoomDuration = 90;

    function easeInOutQuint(t) {
        return t < 0.5 ? 16 * t * t * t * t * t : 1 - Math.pow(-2 * t + 2, 5) / 2;
    }

    const pathPoints = [];
    const maxPathPoints = 780;
    const branches = [];
    const maxBranches = 150;

    /* ─── Fish 파티클 ─── */
    const fishes = [];
    const numFishes = 300;

    class Fish {
        constructor(index) {
            const maxRange = Math.floor(maxPathPoints * 0.6);
            this.pathIndex = 5 + Math.floor(index * (maxRange / numFishes)) + Math.floor(Math.random() * 15);
            this.offsetX = (Math.random() - 0.5) * 60;
            this.offsetY = (Math.random() - 0.5) * 60;
            this.x = circle.x; this.y = circle.y;
            this.size = 0.5 + Math.random() * 1;
            this.opacity = 0.4 + Math.random() * 0.4;
            this.speed = 0.05 + Math.random() * 0.1;
            this.wobble = Math.random() * Math.PI * 2;
            this.wobbleSpeed = 0.02 + Math.random() * 0.04;
        }
        update() {
            const idx = Math.min(this.pathIndex, pathPoints.length - 1);
            if (pathPoints[idx]) {
                const t = pathPoints[idx];
                this.x += (t.x + this.offsetX - this.x) * this.speed;
                this.y += (t.y + this.offsetY - this.y) * this.speed;
            }
            this.wobble += this.wobbleSpeed;
            this.x += Math.sin(this.wobble) * 0.5;
            this.y += Math.cos(this.wobble * 0.7) * 0.5;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,${this.opacity})`;
            ctx.fill();
        }
    }
    for (let i = 0; i < numFishes; i++) fishes.push(new Fish(i));

    /* ─── Branch 클래스 ─── */
    class Branch {
        constructor(x, y, angle, length, depth = 0, isRoot = false) {
            this.points = [{ x, y }];
            this.maxPoints = Math.floor(length / 2);
            this.angle = angle; this.targetAngle = angle;
            this.length = length; this.depth = depth; this.isRoot = isRoot;
            this.growing = true;
            this.growthSpeed = isRoot ? 0.5 + Math.random() * 0.2 : 0.735 + Math.random() * 0.245;
            this.opacity = 1; this.age = 0;
            this.maxAge = isRoot ? 200 + Math.random() * 100 : 312 + Math.random() * 203;
            this.hasSpawned = false;
            const baseWidth = isRoot ? [0.6, 0.3, 0.2] : [1.5, 0.8, 0.4, 0.3];
            this.lineWidth = baseWidth[Math.min(depth, baseWidth.length - 1)] + Math.random() * 0.1;
            this.nodeRadius = Math.max(0.8, 2 - depth * 0.5);
            this.isShape = Math.random() < 0.5;
            this.typeIdx = this.isShape
                ? Math.floor(Math.random() * SHAPES.length)
                : Math.floor(Math.random() * GLYPHS.length);
            this.colorIdx = Math.floor(Math.random() * BLOCK_COLORS.length);
            this.letterRotation = (Math.random() - 0.5) * 0.4;
            this.letterOpacity = 0;
            const sizeScale = this.isShape ? 0.5 : 1;
            this.blockSize = Math.round((
                depth === 0 ? 9.8 + Math.random() * 2.8
              : depth === 1 ? 7 + Math.random() * 2.8
              : 5.6 + Math.random() * 2.1
            ) * sizeScale);
        }
        move(dx, dy) { this.points.forEach(p => { p.x += dx; p.y += dy; }); }
        getEndPoint() { return this.points[this.points.length - 1]; }
        update() {
            if (this.growing && this.points.length < this.maxPoints) {
                const last = this.getEndPoint();
                this.angle += (this.targetAngle - this.angle) * 0.1;
                this.targetAngle += (Math.random() - 0.5) * 0.5;
                const nx = last.x + Math.cos(this.angle) * this.growthSpeed;
                const ny = last.y + Math.sin(this.angle) * this.growthSpeed;
                this.points.push({ x: nx, y: ny });
            } else if (this.growing) {
                this.growing = false;
                if (!this.hasSpawned && this.depth < 2 && Math.random() < 0.3) {
                    this.hasSpawned = true;
                    const end = this.getEndPoint();
                    const childAngle = this.angle + (Math.random() - 0.5) * 1.0;
                    const childLength = this.length * (0.4 + Math.random() * 0.3);
                    branches.push(new Branch(end.x, end.y, childAngle, childLength, this.depth + 1));
                }
            } else {
                this.age++;
                if (this.letterOpacity < 1) this.letterOpacity = Math.min(1, this.letterOpacity + 0.03);
                if (this.age > this.maxAge) this.opacity -= 0.0125;
            }
            const s = this.points[0];
            if (s.x < -300 || s.x > canvas.width + 300 || s.y < -300 || s.y > canvas.height + 300) this.opacity = 0;
            return this.opacity > 0;
        }
        draw() {
            if (this.opacity <= 0 || this.points.length < 2) return;
            ctx.save();
            ctx.globalAlpha = this.opacity;
            ctx.beginPath();
            ctx.moveTo(this.points[0].x, this.points[0].y);
            for (let i = 1; i < this.points.length; i++) ctx.lineTo(this.points[i].x, this.points[i].y);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = this.lineWidth;
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.stroke();
            if (!this.growing && !this.isRoot) {
                const end = this.getEndPoint();
                drawCached(end.x, end.y, this.isShape ? 's' : 'g',
                    this.typeIdx, this.colorIdx, this.blockSize,
                    this.letterRotation, this.letterOpacity * this.opacity);
            }
            ctx.restore();
        }
    }

    /* ─── Companion 위성 원 ─── */
    const companions = [];
    const MAX_COMPANIONS = 6, MIN_COMPANIONS = 3;
    let nextCompanionSpawn = 345;

    class Companion {
        constructor() {
            this.offsetAngle = Math.random() * Math.PI * 2;
            this.offsetDist = 20 + Math.random() * 60;
            this.offsetSpeed = (0.002 + Math.random() * 0.006) * (Math.random() < 0.5 ? 1 : -1);
            this.radius = 3 + Math.random() * 2;
            this.opacity = 0; this.age = 0;
            this.maxAge = 600 + Math.floor(Math.random() * 1800);
            this.fading = false;
            this.pathPoints = []; this.maxPathPoints = 300;
            this.lineWidth = 0.8 + Math.random() * 0.7;
            this.branchTimer = Math.floor(Math.random() * 5);
        }
        get x() { return circle.x + Math.cos(this.offsetAngle) * this.offsetDist; }
        get y() { return circle.y + Math.sin(this.offsetAngle) * this.offsetDist; }
        update(mx, my) {
            this.age++;
            this.offsetAngle += this.offsetSpeed;
            if (!this.fading) this.opacity = Math.min(1, this.opacity + 0.01);
            if (this.age > this.maxAge && !this.fading) this.fading = true;
            if (this.fading) this.opacity = Math.max(0, this.opacity - 0.008);
            this.pathPoints.forEach(p => { p.x += mx; p.y += my; });
            this.pathPoints.unshift({ x: this.x, y: this.y });
            if (this.pathPoints.length > this.maxPathPoints) this.pathPoints.pop();
            this.branchTimer++;
            if (this.branchTimer >= 6 && !this.fading && this.opacity > 0.5 && branches.length < maxBranches) {
                this.branchTimer = 0;
                const idx = Math.floor(Math.random() * Math.min(30, this.pathPoints.length));
                const p = this.pathPoints[idx];
                if (p && Math.random() < 0.3) {
                    const a = pathAngle + (Math.random() - 0.5) * 1.4;
                    branches.push(new Branch(p.x, p.y, a, 60 + Math.random() * 140, 1));
                }
            }
            return this.opacity > 0;
        }
        draw() {
            if (this.opacity <= 0) return;
            if (this.pathPoints.length > 1) {
                ctx.lineWidth = this.lineWidth;
                ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                const fadeStart = 0.8;
                const fadeIndex = Math.floor(this.pathPoints.length * fadeStart);
                if (fadeIndex > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.pathPoints[0].x, this.pathPoints[0].y);
                    for (let i = 1; i < fadeIndex; i++) ctx.lineTo(this.pathPoints[i].x, this.pathPoints[i].y);
                    ctx.strokeStyle = `rgba(255,255,255,${this.opacity})`;
                    ctx.stroke();
                }
                for (let i = Math.max(1, fadeIndex); i < this.pathPoints.length; i++) {
                    const ratio = i / this.pathPoints.length;
                    const alpha = (1 - ((ratio - fadeStart) / (1 - fadeStart))) * this.opacity;
                    ctx.beginPath();
                    ctx.moveTo(this.pathPoints[i - 1].x, this.pathPoints[i - 1].y);
                    ctx.lineTo(this.pathPoints[i].x, this.pathPoints[i].y);
                    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
                    ctx.stroke();
                }
            }
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,${this.opacity})`;
            ctx.fill();
        }
    }

    /* ─── 메인 애니메이션 ─── */
    let time = 0;

    function animate() {
        requestAnimationFrame(animate);
        time++;

        // 배경 그라데이션 — 느리게 회전
        const bgAngle = time * 0.002;
        const cx = canvas.width / 2, cy = canvas.height / 2;
        const r = Math.max(canvas.width, canvas.height);
        const gx = Math.cos(bgAngle) * r, gy = Math.sin(bgAngle) * r;
        const bgGrad = ctx.createLinearGradient(cx - gx, cy - gy, cx + gx, cy + gy);
        bgGrad.addColorStop(0, '#E84B8A');
        bgGrad.addColorStop(1, '#F06040');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 인트로 시퀀스
        if (time <= 165) {
            if (time > 90) {
                const t = (time - 90) / 150;
                const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
                ctx.save();
                ctx.translate(cx, cy);
                ctx.scale(zoom, zoom);
                ctx.translate(-cx, -cy);
                // 글로우
                const glowPeak = ease < 0.5 ? ease / 0.5 : Math.max(0.15, 1 - (ease - 0.5) * 1.2);
                const glowR = 10 + ease * 70;
                const glow = ctx.createRadialGradient(circle.x, circle.y, 0, circle.x, circle.y, glowR);
                glow.addColorStop(0, `rgba(255,255,255,${glowPeak * 0.6})`);
                glow.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.beginPath(); ctx.arc(circle.x, circle.y, glowR, 0, Math.PI * 2);
                ctx.fillStyle = glow; ctx.fill();
                // 링 웨이브
                if (t > 0.25) {
                    const rt = Math.min(1, (t - 0.25) / 0.6);
                    const rtE = rt < 0.5 ? 2 * rt * rt : 1 - Math.pow(-2 * rt + 2, 2) / 2;
                    ctx.beginPath(); ctx.arc(circle.x, circle.y, rtE * 220, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255,255,255,${Math.max(0, 1 - rtE * 1.1) * 0.4})`;
                    ctx.lineWidth = 1.5 * (1 - rtE * 0.6); ctx.stroke();
                }
                // 중심 원
                if (t > 0.2) {
                    const ct = Math.min(1, (t - 0.2) / 0.5);
                    const ctE = ct < 0.5 ? 4 * ct * ct * ct : 1 - Math.pow(-2 * ct + 2, 3) / 2;
                    const s = 1.70158;
                    const back = 1 + (s + 1) * Math.pow(ctE - 1, 3) + s * Math.pow(ctE - 1, 2);
                    ctx.beginPath(); ctx.arc(circle.x, circle.y, 6 * back, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,255,255,${Math.min(1, (t - 0.2) * 2.5)})`;
                    ctx.fill();
                }
                ctx.restore();
            }
            return;
        }

        // 방향 제어
        if (isMouseActive) {
            targetPathAngle = Math.atan2(mouseY - circle.y, mouseX - circle.x);
        } else if (time % 60 === 0) {
            targetPathAngle += (Math.random() - 0.5) * Math.PI * 0.3;
        }
        let ad = targetPathAngle - pathAngle;
        ad = ((ad % (Math.PI * 2)) + Math.PI * 3) % (Math.PI * 2) - Math.PI;
        pathAngle += ad * 0.04;

        // 줌 변경
        if (time % 600 === 0) {
            zoomFrom = zoom;
            targetZoom = 1.2 + Math.random() * 1.0;
            zoomProgress = 0;
        }
        if (zoomProgress < 1) {
            zoomProgress = Math.min(1, zoomProgress + 1 / zoomDuration);
            zoom = zoomFrom + (targetZoom - zoomFrom) * easeInOutQuint(zoomProgress);
        }

        const moveX = -Math.cos(pathAngle) * pathSpeed;
        const moveY = -Math.sin(pathAngle) * pathSpeed;

        pathPoints.forEach(p => { p.x += moveX; p.y += moveY; });
        pathPoints.unshift({ x: circle.x, y: circle.y });
        if (pathPoints.length > maxPathPoints) pathPoints.pop();

        branches.forEach(b => b.move(moveX, moveY));

        // 컴패니언 업데이트
        for (let i = companions.length - 1; i >= 0; i--) {
            if (!companions[i].update(moveX, moveY)) companions.splice(i, 1);
        }
        if (time >= nextCompanionSpawn && companions.length < MAX_COMPANIONS) {
            companions.push(new Companion());
            nextCompanionSpawn = companions.length < MIN_COMPANIONS
                ? time + 60 + Math.floor(Math.random() * 120)
                : time + 300 + Math.floor(Math.random() * 900);
        }

        // 가지 생성
        if (time % 3 === 0 && branches.length < maxBranches && pathPoints.length > 1) {
            const idx = Math.floor(Math.random() * Math.min(60, pathPoints.length));
            const p = pathPoints[idx];
            if (p) {
                if (Math.random() < 0.2) {
                    branches.push(new Branch(p.x, p.y, pathAngle + Math.PI + (Math.random() - 0.5) * 0.8, 40 + Math.random() * 60, 0, true));
                } else {
                    branches.push(new Branch(p.x, p.y, pathAngle + (Math.random() - 0.5) * 1.0, 135 + Math.random() * 270));
                }
            }
        }

        // 줌 변환
        ctx.save();
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.scale(zoom, zoom);
        ctx.translate(-canvas.width / 2, -canvas.height / 2);

        // 메인 줄기
        if (pathPoints.length > 1) {
            ctx.lineWidth = 3;
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            const fadeStart = 0.8;
            const fadeIndex = Math.floor(pathPoints.length * fadeStart);
            if (fadeIndex > 1) {
                ctx.beginPath();
                ctx.moveTo(pathPoints[0].x, pathPoints[0].y);
                for (let i = 1; i < fadeIndex; i++) ctx.lineTo(pathPoints[i].x, pathPoints[i].y);
                ctx.strokeStyle = '#fff'; ctx.stroke();
            }
            for (let i = Math.max(1, fadeIndex); i < pathPoints.length; i++) {
                const ratio = i / pathPoints.length;
                const opacity = 1 - ((ratio - fadeStart) / (1 - fadeStart));
                ctx.beginPath();
                ctx.moveTo(pathPoints[i - 1].x, pathPoints[i - 1].y);
                ctx.lineTo(pathPoints[i].x, pathPoints[i].y);
                ctx.strokeStyle = `rgba(255,255,255,${opacity})`; ctx.stroke();
            }
        }

        // 가지 그리기
        for (let i = branches.length - 1; i >= 0; i--) {
            if (!branches[i].update()) branches.splice(i, 1);
            else branches[i].draw();
        }

        // 가지 끝점 연결선
        const ends = [];
        for (const b of branches) {
            if (!b.growing && !b.isRoot && b.opacity > 0.3) ends.push(b.getEndPoint());
        }
        if (ends.length > 1) {
            ctx.lineWidth = 0.3; ctx.setLineDash([2, 4]);
            for (let i = 0; i < ends.length; i++) {
                for (let j = i + 1; j < ends.length; j++) {
                    const dx = ends[j].x - ends[i].x, dy = ends[j].y - ends[i].y;
                    const dist = dx * dx + dy * dy;
                    if (dist < 3600) {
                        ctx.beginPath();
                        ctx.moveTo(ends[i].x, ends[i].y); ctx.lineTo(ends[j].x, ends[j].y);
                        ctx.strokeStyle = `rgba(255,255,255,${(1 - dist / 3600) * 0.25})`;
                        ctx.stroke();
                    }
                }
            }
            ctx.setLineDash([]);
        }

        // 컴패니언 그리기
        companions.forEach(c => c.draw());

        // 중심 원
        ctx.beginPath();
        ctx.arc(circle.x, circle.y, 6, 0, Math.PI * 2);
        ctx.fillStyle = '#fff'; ctx.fill();

        // 인트로 잔향
        if (time > 165 && time < 300) {
            const it = Math.min(1, (time - 90) / 150);
            const fade = Math.max(0, 1 - (time - 165) / 100);
            const iE = it < 0.5 ? 4 * it * it * it : 1 - Math.pow(-2 * it + 2, 3) / 2;
            const gp = iE < 0.5 ? iE / 0.5 : Math.max(0.15, 1 - (iE - 0.5) * 1.2);
            const gR = 10 + iE * 70;
            const glow = ctx.createRadialGradient(circle.x, circle.y, 0, circle.x, circle.y, gR);
            glow.addColorStop(0, `rgba(255,255,255,${gp * 0.6 * fade})`);
            glow.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.beginPath(); ctx.arc(circle.x, circle.y, gR, 0, Math.PI * 2);
            ctx.fillStyle = glow; ctx.fill();
        }

        // Fish 파티클
        fishes.forEach(f => { f.update(); f.draw(); });

        ctx.restore();

        // 커서 글리프 트레일 (줌 밖에서 그리기)
        if (isMouseVisible && cacheReady) {
            const dx = mouseX - lastTrailX, dy = mouseY - lastTrailY;
            if (dx * dx + dy * dy > TRAIL_SPAWN_DIST * TRAIL_SPAWN_DIST) {
                lastTrailX = mouseX; lastTrailY = mouseY;
                cursorTrail.unshift(new TrailBlock(mouseX, mouseY));
                const visible = cursorTrail.filter(t => !t.fading).length;
                if (visible > MAX_TRAIL) {
                    for (let i = cursorTrail.length - 1; i >= 0; i--) {
                        if (!cursorTrail[i].fading) { cursorTrail[i].fadeOut(); break; }
                    }
                }
            }
            for (let i = 0; i < cursorTrail.length; i++) {
                const tx = i === 0 ? mouseX : cursorTrail[i - 1].x;
                const ty = i === 0 ? mouseY : cursorTrail[i - 1].y;
                cursorTrail[i].update(tx, ty, i);
            }
            for (let i = cursorTrail.length - 1; i >= 0; i--) {
                if (cursorTrail[i].fading && cursorTrail[i].alpha < 0.01) cursorTrail.splice(i, 1);
            }
            for (let i = cursorTrail.length - 1; i >= 0; i--) cursorTrail[i].draw();
        }
    }

    animate();
}
</script>
</body>
</html>
